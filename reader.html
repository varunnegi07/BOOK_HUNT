<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Reader - BookHunt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        .reader-container {
            display: flex;
            height: 100vh;
            gap: 1px;
            background: #1a1f2e;
        }

        /* ── PDF VIEWER SECTION ── */
        .pdf-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f1419;
            border-right: 1px solid #2a3f5f;
            min-width: 0;
        }

        .pdf-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #2a3f5f;
            background: linear-gradient(135deg, #1a1f2e 0%, #252d3d 100%);
        }

        .pdf-header h2 {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .pdf-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .pdf-controls button {
            background: #2a3f5f;
            border: none;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .pdf-controls button:hover {
            background: #3a4f7f;
            transform: translateY(-1px);
        }

        .pdf-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 12px;
            color: #a0a0a0;
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 4px;
        }

        .pdf-viewer {
            flex: 1;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            background: #0f1419;
        }

        .pdf-canvas {
            max-width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        .pdf-viewer::-webkit-scrollbar {
            width: 8px;
        }

        .pdf-viewer::-webkit-scrollbar-track {
            background: transparent;
        }

        .pdf-viewer::-webkit-scrollbar-thumb {
            background: #3a4f7f;
            border-radius: 4px;
        }

        .pdf-viewer::-webkit-scrollbar-thumb:hover {
            background: #4a5f9f;
        }

        /* ── CHAT SECTION ── */
        .chat-section {
            width: 380px;
            display: flex;
            flex-direction: column;
            background: #1a1f2e;
            border-left: 1px solid #2a3f5f;
        }

        @media (max-width: 1024px) {
            .chat-section {
                width: 320px;
            }

            .reader-container {
                flex-direction: column;
                gap: 0;
            }

            .pdf-section {
                flex: 0.6;
                border-right: none;
                border-bottom: 1px solid #2a3f5f;
            }

            .chat-section {
                flex: 0.4;
                width: 100%;
                border-left: none;
                border-top: 1px solid #2a3f5f;
            }
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a3f5f;
            background: linear-gradient(135deg, #1a1f2e 0%, #252d3d 100%);
        }

        .chat-header h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-header .subtitle {
            font-size: 11px;
            color: #808080;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #3a4f7f;
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 85%;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-content.user-msg {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 8px 2px 8px 8px;
        }

        .message-content.bot-msg {
            background: #2a3f5f;
            color: #e0e0e0;
            border-radius: 2px 8px 8px 8px;
        }

        .message-content.bot-msg code {
            background: rgba(0,0,0,0.3);
            padding: 2px 4px;
            border-radius: 2px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .loading-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            color: #808080;
            font-size: 12px;
        }

        .loading-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #808080;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            40% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #2a3f5f;
            background: #1a1f2e;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background: #252d3d;
            border: 1px solid #3a4f5f;
            color: #e0e0e0;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input:focus {
            border-color: #6366f1;
            background: #2a323d;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .chat-input::placeholder {
            color: #606070;
        }

        .btn-send {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ── HEADER / BACK BUTTON ── */
        .top-bar {
            padding: 12px 20px;
            background: #0f1419;
            border-bottom: 1px solid #2a3f5f;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-button {
            background: #2a3f5f;
            border: none;
            color: #e0e0e0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .back-button:hover {
            background: #3a4f7f;
        }

        .book-info {
            flex: 1;
            margin-left: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .book-info-text h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .book-info-text p {
            font-size: 12px;
            color: #808080;
        }

        .book-icon {
            font-size: 24px;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
        }

        .quick-actions button {
            background: #2a3f5f;
            border: none;
            color: #e0e0e0;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .quick-actions button:hover {
            background: #3a4f7f;
        }

        /* Loading state */
        .pdf-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #808080;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #3a4f5f;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="back-button" onclick="goBackToLibrary()">← Back to Library</button>
        <div class="book-info">
            <div class="book-icon" id="bookIcon">📚</div>
            <div class="book-info-text">
                <h4 id="bookTitle">Loading...</h4>
                <p id="bookAuthor">By Author</p>
            </div>
        </div>
        <div class="quick-actions">
            <button onclick="toggleBookmark()" id="bookmarkBtn" title="Add to Bookmarks">❤️ Save</button>
        </div>
    </div>

    <div class="reader-container">
        <!-- PDF VIEWER -->
        <div class="pdf-section">
            <div class="pdf-header">
                <h2 id="pdfTitle">Article Title</h2>
                <div class="pdf-controls">
                    <button onclick="previousPage()" id="prevBtn">← Prev</button>
                    <div class="page-info">
                        <span id="pageNum">1</span> / <span id="pageCount">0</span>
                    </div>
                    <button onclick="nextPage()" id="nextBtn">Next →</button>
                </div>
            </div>
            <div class="pdf-viewer" id="pdfViewer">
                <div class="pdf-loading">
                    <div class="loader"></div>
                </div>
            </div>
        </div>

        <!-- CHAT SECTION -->
        <div class="chat-section">
            <div class="chat-header">
                <h3>📖 Ask AI About This Book</h3>
                <div class="subtitle">Get answers from any page</div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Ask a question..." />
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="reader.js"></script>
</body>
</html>
